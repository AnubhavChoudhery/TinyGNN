# =============================================================================
#  TinyGNN — Continuous Integration
#  .github/workflows/ci.yml
#
#  Triggered on:
#    • Pull requests targeting main  (code-path changes only — see paths filter)
#    • Manual workflow_dispatch
#  NOT triggered on direct pushes to main (saves free-tier minutes).
#  macOS and Windows runners have been removed from the matrix for the same
#  reason (macOS = 10× minute multiplier, Windows = 2×).
#
#  Jobs (Linux only):
#    1. cpp-build-test    — CMake build + CTest (GCC)
#    2. python-build-test — pip install + pytest
#    3. sanitizers        — ASan + UBSan
#    4. docs              — Doxygen + Sphinx
#
#  NOTE: Valgrind (Memcheck + Helgrind) was removed from CI because the
#  scale-simulation tests in test_graph_loader take 30-120 s unoptimised;
#  under Valgrind (10-100× overhead) they exceed the 6-hour job limit.
#  Run scripts/valgrind_all.sh locally for on-demand memory checking.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'python/**'
      - 'CMakeLists.txt'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  Job 1: C++ Build + Test (CMake) — Linux / GCC only
  # ═══════════════════════════════════════════════════════════════════════════
  cpp-build-test:
    name: C++ (ubuntu, gcc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure -j4

  # ═══════════════════════════════════════════════════════════════════════════
  #  Job 2: Python Build + Test — Linux / Python 3.12 only
  # ═══════════════════════════════════════════════════════════════════════════
  python-build-test:
    name: Python (ubuntu, 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install pybind11 numpy setuptools wheel psutil

      - name: Build extension
        run: python setup.py build_ext --inplace

      - name: Install test dependencies
        run: pip install pytest scipy

      - name: Run Python tests
        run: python -m pytest tests/test_python_bindings.py -v --tb=short

  # ═══════════════════════════════════════════════════════════════════════════
  #  Job 3: Memory Safety — ASan + UBSan (Linux only)
  # ═══════════════════════════════════════════════════════════════════════════
  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake with sanitizers
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build-san
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build with sanitizers
        run: cmake --build build-san --parallel

      - name: Run tests under ASan + UBSan
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: |
          cd build-san
          for test in test_tensor test_graph_loader test_matmul test_spmm \
                      test_activations test_gcn test_graphsage test_gat; do
            echo "=== Running $test under ASan+UBSan ==="
            ./$test
            echo "=== $test PASSED ==="
          done
          echo "All sanitizer tests passed!"

  # ═══════════════════════════════════════════════════════════════════════════
  #  Job 4: Documentation Build (Doxygen + Sphinx)
  # ═══════════════════════════════════════════════════════════════════════════
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen C++ docs
        run: doxygen Doxyfile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Sphinx dependencies
        run: pip install sphinx sphinx-rtd-theme breathe

      - name: Build Sphinx documentation
        run: |
          cd docs
          make html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html/
          retention-days: 30
